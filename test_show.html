<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>魚図鑑</title>

<style>
/* html{
    scroll-snap-type: y mandatory;
} */
body{
    margin:0;
    background-color: rgb(0, 0, 0);
    display:flex;
    justify-content: center;
    align-items: center;
    flex-direction:column;
}

.imag{
    width:100%;
    /* height:100%; */
    /* position: relative; */
    justify-content:center;
    display: flex;
    flex-direction:column;
    align-items:center;
}

.imag img{
    max-width: 100%;
    max-height: 100%;
    display: block;
    /* position: absolute; */
    object-fit: contain;
}
.info{
    margin: 20px;
    position: absolute;
    left: 10px;
    /* top: 10px; */
    bottom: 10px;
    text-align: left;
    color: aliceblue;
}
.name{
    font-size: 130px;
    font-weight: bold;

}
.desc{
    font-size: 40px;
    max-width:850px;
    word-wrap: break-word;
}

.info2{
    margin: 20px;
    position: absolute;
    right: 10px;
    /* top: 60px; */
    bottom: 10px;
    
    text-align: right;
    color: aliceblue;
    font-size: 30px;
}

.content{
    position: relative;
    /* scroll-snap-align: start; */
    

}


.menu{
    position:fixed;
    background:#222;
    padding:15px;
    z-index: 1000;
    display:flex;
    justify-content:center;
    gap:30px;
    top:0;
    left:0;
    width:100%;
}

.menu button{
    /* flex:1; */
width: 170px;
height: 50px;
background:none;     /* 背景を消す */
border:none;         /* 枠を消す */
color:#ccc;
font-size:20px;

cursor:pointer;      /* マウスカーソル */
padding:8px 16px;
position:relative;
}
.menu button:hover{
color:white;
}

.menu button::after{

content:"";
position:absolute;

left:0;
bottom:-4px;

width:0;
height:2px;

background:white;

transition:0.3s;

}


.menu button:hover::after{

width: 100%;
}

.menu input{
    
    border:none;
    width: 200px;
    margin: 5px;
    /* padding:6px; */
}

</style>

</head>

<body>



<div class="menu">
       
        <button>ホーム</button>
        <button>絞り込み</button>
        <button>マップ</button>
        <button>お知らせ</button>
        <button>サイト</button>
        <input type="text" placeholder="検索">
</div>
<div class="imag">

        </div>

            <div class="type">分類: イヌ科</div>

        </div>
        
    </section>

    <section class="content">
        <img src="sakana/dwdww.png">
        <div class ="info">
            <div class="name">鮪(マグロ)</div>
            <div class="desc">ここに説明文が入りますあああああああああああああああああああああああ</div>
        </div>

        <div class="info2">

        </div>

        <div class="info2">
            <div class ="bige">全長: 20~30cm</div>
            <div class="deep">水深: 100~200m</div>

</div>

</body>

</html>
